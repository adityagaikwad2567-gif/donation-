[build]
  command = "vite build"
  publish = "dist/client"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[functions]
  directory = "netlify/functions"

# Protect admin route — only users with the admin role
[[redirects]]
  from = "/admin"
  to = "/admin"
  status = 200
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin"
  to = "/"
  status = 302
